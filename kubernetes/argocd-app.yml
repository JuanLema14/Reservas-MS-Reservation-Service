apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reservation-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Isa-Bedoya-UdeA/Reservas-MS-Reservation-Service
    targetRevision: HEAD
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
