# Test Profile Configuration - Minimal setup for unit tests
spring.application.name=Reservas-MS-Reservation-Service

# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Feign auto-configuration to avoid HTTP client conflicts
spring.cloud.openfeign.autoconfiguration.enabled=false
spring.cloud.openfeign.client.enabled=false
feign.httpclient.enabled=false

# Disable JPA auto configuration for web tests
spring.jpa.open-in-view=false

# Disable email for tests
email.enabled=false

# Disable Feign clients loading
feign.client.enabled=false

# JWT Configuration for tests
jwt.secret=test-secret-key-for-testing-purposes-only-12345678901234567890
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Disable security for health endpoint tests (use @WebMvcTest with permit all)
# SecurityConfig will be loaded but health endpoints are public

# Disable actuator endpoints
management.endpoints.enabled-by-default=false

# Disable OpenAPI
springdoc.api-docs.enabled=false

# Logging
logging.level.com.codefactory.reservasmsreservationservice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN