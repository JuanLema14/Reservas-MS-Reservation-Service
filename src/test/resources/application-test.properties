spring.profile=test
spring.config.import=optional:file:.env

# ── H2 en modo PostgreSQL ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT (valores de test, no usar en producción) ──────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=3600000

# ── URLs de clientes Feign (mockeadas en tests) ───────────
services.auth.url=http://localhost:8081
services.catalog.url=http://localhost:8082
services.schedule.url=http://localhost:8083
services.reservation.url=http://localhost:8084

# ── Email (no se envía en tests) ─────────────────────────
email.host=smtp.gmail.com
email.port=587
email.username=test@example.com
email.password=test-password
email.smtp.auth=true
email.smtp.starttls.enable=true

# ── Logging ───────────────────────────────────────────────
logging.level.com.codefactory=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
