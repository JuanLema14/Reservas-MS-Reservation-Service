# Server
server.port=8084

# ======================
# DATABASE CONFIG - SUPABASE (Transaction Pooler - IPv4 compatible)
# ======================
# MS-Reservation - URL del Transaction Pooler de Supabase (compatible con IPv4)
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USER:postgres.cfwnllouvhrehyfprqmb}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - desarrollo (valida el esquema sin modificar)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Connection Pool - HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging detallado para desarrollo
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator para health checks en desarrollo
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Frontend URL para desarrollo
frontend.url=${FRONTEND_URL:http://localhost:3000}