spring.application.name=Reservas-MS-Reservation-Service
spring.config.import=optional:file:.env,optional:classpath:email.properties
spring.profiles.active=${SPRING_PROFILE:dev}

# Content Negotiation
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.media-types.json=application/json

# Feign Client URLs
services.auth-service.url=${SERVICES_AUTH_URL:http://localhost:8081}
services.catalog-service.url=${SERVICES_CATALOG_URL:http://localhost:8082}
services.schedule-service.url=${SERVICES_SCHEDULE_URL:http://localhost:8083}

# JWT Configuration
jwt.secret=${JWT_SECRET:default-secret-key-change-in-prod}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Frontend URL
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Platform name for emails
platform.name=Plataforma de Reservas

# Email enabled flag (set to false to disable email sending)
email.enabled=${EMAIL_ENABLED:true}

# Logging base
logging.level.com.codefactory.reservasmsreservationservice=DEBUG
logging.level.org.springframework.web=INFO

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always