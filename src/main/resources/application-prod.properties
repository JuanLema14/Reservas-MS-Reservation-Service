# Server - Render asigna puerto dinámicamente vía variable $PORT
server.port=${PORT:8084}

# Database - Supabase (producción - variables inyectadas)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - producción (NO modificar esquema automáticamente)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool - optimizado para producción en Supabase
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging - solo errores en producción
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.codefactory.reservasmsreservationservice=INFO

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator - solo health básico en producción
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Security headers
server.forward-headers-strategy=framework

# Feign Client URLs - URLs de otros microservicios en producción
services.auth-service.url=${SERVICES_AUTH_URL:https://reservas-ms-auth-service.onrender.com}
services.catalog-service.url=${SERVICES_CATALOG_URL:https://reservas-ms-catalog-service.onrender.com}
services.schedule-service.url=${SERVICES_SCHEDULE_URL:https://reservas-ms-schedule-service.onrender.com}

# Feign Client Timeout - para manejar cold start de Render
feign.client.config.default.connectTimeout=60000
feign.client.config.default.readTimeout=60000

# Frontend URL para producción
frontend.url=${FRONTEND_URL:https://front-code-factory-2026-1-caso-15-henna.vercel.app}

# Email Configuration
email.host=smtp.gmail.com
email.port=587
email.username=${EMAIL_USERNAME}
email.password=${EMAIL_PASSWORD}
email.smtp.auth=true
email.smtp.starttls.enable=true
email.smtp.starttls.required=true